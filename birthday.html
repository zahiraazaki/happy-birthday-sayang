<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>

body {
    background: #fff0f5;
    font-family: "Comic Sans MS", cursive;
    text-align: center;
    padding: 40px;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 0 20px pink;
}

h1 {
    color: #ff69b4;
}

button {
    background: pink;
    border: none;
    padding: 15px 25px;
    border-radius: 20px;
    font-size: 16px;
    cursor:pointer;
}

#message {
    display:none;
    margin-top:20px;
}

img {
    width:200px;
    border-radius:20px;
}

</style>

</head>


<body>

<div class="card">

<h1>Happy Birthday My Love ❤️</h1>

<p>
I made you a tiny silly website hehe
</p>


<img src="ourphoto.jpg">


<br><br>

<button onclick="showMessage()">
Click me :)
</button>


<div id="message">

<h2>🥳 Surprise!!</h2>

<p>
Thank you for being my favourite person.
<br><br>
Thank you for all the laughs, the memories,
and for always being there.
<br><br>

I hope this year brings you happiness,
success, and everything you wish for.

I love you 🤍

</p>

</div>

</div>


<script>

function showMessage(){

document.getElementById("message").style.display="block";

}

</script>


</body>

</html>
